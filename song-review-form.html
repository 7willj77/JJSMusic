<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Song Review Submission | JJS Music</title>

  <meta name="robots" content="noindex, follow">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #050705;
      color: #f4f4f4;
      line-height: 1.7;
    }

    header {
      padding: 24px;
      border-bottom: 1px solid rgba(29, 185, 84, 0.25);
      background: #050705;
    }

    nav {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .brand {
      color: #1DB954;
      font-weight: 800;
      letter-spacing: 2px;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 70px 24px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      line-height: 1.1;
      margin-bottom: 18px;
    }

    p {
      color: #b9c2ba;
      font-size: 1.05rem;
    }

    form {
      margin-top: 32px;
      padding: 32px;
      border-radius: 24px;
      border: 1px solid rgba(29, 185, 84, 0.25);
      background: linear-gradient(180deg, rgba(12, 22, 14, 0.95), rgba(5, 9, 6, 0.95));
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      font-weight: 700;
      color: #ffffff;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(29, 185, 84, 0.35);
      background: #081109;
      color: #ffffff;
      font-size: 1rem;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 24px;
      padding: 14px 22px;
      border: none;
      border-radius: 999px;
      background: #1DB954;
      color: #031006;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #25d366;
    }

    .note {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #b9c2ba;
    }
  </style>
</head>

<body>

  <header>
    <nav>
      <a class="brand" href="index.html">JJS MUSIC</a>
      <a href="song-reviews.html">Back to Song Reviews</a>
    </nav>
  </header>

  <main>
    <h1>Song Review Submission</h1>

    <p>
      Submit your song details below. After submitting, you will be taken to PayPal to complete your £9.99 payment.
    </p>

    <form action="https://formsubmit.co/jjsmusic@atomicmail.io" method="POST">

      <input type="hidden" name="_subject" value="New Song Review Submission">
      <input type="hidden" name="_next" value="https://www.jjsmusic.co.uk/song-review-payment.html">
      <input type="hidden" name="_captcha" value="false">

      <label for="email">Your Email Address</label>
      <input type="email" id="email" name="Email Address" required>

      <label for="artist">Artist / Band Name</label>
      <input type="text" id="artist" name="Artist / Band Name" required>

      <label for="song">Song Title</label>
      <input type="text" id="song" name="Song Title" required>

      <label for="link">Song Link</label>
      <input type="url" id="link" name="Song Link" placeholder="Spotify, SoundCloud, YouTube, Dropbox, Google Drive or private link" required>

      <label for="genre">Genre</label>
      <input type="text" id="genre" name="Genre">

      <label for="feedback">What would you like feedback on?</label>
      <select id="feedback" name="Feedback Focus" required>
        <option value="">Select an option</option>
        <option value="Overall song review">Overall song review</option>
        <option value="Songwriting and structure">Songwriting and structure</option>
        <option value="Production and mix">Production and mix</option>
        <option value="Vocals and performance">Vocals and performance</option>
        <option value="Commercial / release potential">Commercial / release potential</option>
        <option value="Everything">Everything</option>
      </select>

      <label for="notes">Additional Notes</label>
      <textarea id="notes" name="Additional Notes" placeholder="Tell us anything useful about the track, your goals, release plans, or areas you are unsure about."></textarea>

      <button type="submit">Submit Details & Continue to Payment</button>

      <p class="note">
        Please make sure your song link is accessible before submitting.
      </p>

    </form>
  </main>

</body>
</html>
